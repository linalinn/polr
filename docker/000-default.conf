<VirtualHost *:80>
    ServerName localhost
    ServerAlias localhost
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined

    DocumentRoot "/var/www/polr/public"
    <Directory "/var/www/polr/public">
        Require all granted
        Options Indexes FollowSymLinks
        AllowOverride All
        Order allow,deny
        Allow from all
    </Directory>
</VirtualHost>
