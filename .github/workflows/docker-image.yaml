name: Docker Image CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/${{ github.actor }}/polr:latest
    - name: Push Docker Image
      run: |
        export DATE=$(date +'%Y-%m-%d-%H-%M')
        docker tag ghcr.io/${{ github.actor }}/polr:latest ghcr.io/${{ github.actor }}/polr:$DATE
        docker push ghcr.io/${{ github.actor }}/polr:latest
        docker push ghcr.io/${{ github.actor }}/polr:$DATE
